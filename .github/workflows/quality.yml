name: Code Quality (SonarCloud)

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run tests with coverage
        run: pnpm -r --if-present test:coverage

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v5
        with:
          args: >
            -Dsonar.organization=manch2
            -Dsonar.projectKey=manch2_LearnMD
            -Dsonar.sources=packages
            -Dsonar.tests=packages
            -Dsonar.test.inclusions=**/*.test.ts,**/*.test.tsx
            -Dsonar.typescript.lcov.reportPaths=packages/core/coverage/lcov.info,packages/default-theme/coverage/lcov.info,packages/cli/coverage/lcov.info
            -Dsonar.exclusions=**/dist/**,**/node_modules/**,**/examples/**,**/docs/**,**/*.md,**/*.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
